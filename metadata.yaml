name: astrbot_plugin_daily408
display_name: 考研408每日真题
desc: 考研408历年真题每日推送插件，支持随机抽奖/编号调取，激发学习兴趣
help: |
  📚 考研408每日真题推送插件

  【功能】
  定时推送408历年真题，支持随机抽奖和编号调取两种模式

  【命令】
  /408菜单 - 查看主菜单
  /408帮助 - 查看详细帮助
  /408抽奖 [科目] - 随机抽取一道真题（科目可选：ds/co/os/cn）
  /408-<编号> - 调取指定编号题目（如 /408-3）
  /408编号 <编号> - 同上（如 /408编号 3）
  /408订阅 - 在当前群订阅每日一题推送
  /408退订 - 在当前群取消订阅
  /408列表 - 查看当前群的订阅状态
  /408全部订阅 - 查看所有群的订阅

version: "1.0.0"
author: User
